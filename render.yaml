# render.yaml — Render Blueprint for one-click deployment
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cpp-academy
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_API_KEY
        generateValue: true
      - key: EXECUTION_TIMEOUT_MS
        value: "5000"
      - key: MAX_CODE_SIZE
        value: "50000"
